<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Success — We'll be in touch! | Already Folded</title>
  <link rel="icon" type="image/png" href="AlreadyFoldedLogo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=Epilogue:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --navy:    #0D1B2A;
      --blue:    #1D6FA4;
      --off:     #F5F8FA;
      --teal:    #1A9B8A;
      --ff-head: 'Fraunces', Georgia, serif;
      --ff-body: 'Epilogue', sans-serif;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: var(--ff-body);
      background-color: var(--off);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      color: var(--navy);
    }

    .card {
      background: white;
      padding: clamp(2rem, 8vw, 4rem);
      border-radius: 24px;
      box-shadow: 0 12px 40px rgba(13,27,42,0.08);
      max-width: 500px;
      width: 90%;
    }

    .logo {
      height: 50px;
      margin-bottom: 2rem;
    }

    .check-icon {
      width: 60px;
      height: 60px;
      background: var(--teal);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      margin: 0 auto 1.5rem;
    }

    h1 {
      font-family: var(--ff-head);
      font-size: 2.2rem;
      margin-bottom: 1rem;
    }

    p {
      color: #556677;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .btn-back {
      display: inline-block;
      background: var(--navy);
      color: white;
      text-decoration: none;
      padding: 1rem 2rem;
      border-radius: 8px;
      font-weight: 700;
      transition: background 0.2s;
    }

    .btn-back:hover {
      background: var(--blue);
    }
  </style>
</head>
<body>

  <div class="card">
    <img src="AlreadyFoldedLogo.png" alt="Already Folded Logo" class="logo">
    <div class="check-icon">✓</div>
    <h1>Talk soon!</h1>
    <p>
      Your request for a partnership call has been received. One of our specialists will reach out within <strong>one business day</strong> to schedule a time.
    </p>
    <a href="index.html" class="btn-back">Back to Home</a>
  </div>

</body>
</html>
